<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const SUPABASE_URL = 'https://kzuvrcfquevlnnyjthsz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6dXZyY2ZxdWV2bG5ueWp0aHN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4Njk0MjMsImV4cCI6MjA5MjQ0NTQyM30.u5S0YjiYRqRsu6HCf_CqxqDLjVKNPSf4gtKWzRXV0O0';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const FAMILY_EMAIL = 'family@packripper.internal';

function useAuth() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showLogin, setShowLogin] = useState(false);

  useEffect(() => {
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      setUser(session?.user ?? null);
      setLoading(false);
    });
    const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
      setUser(session?.user ?? null);
      if (session?.user) setShowLogin(false);
    });
    return () => subscription.unsubscribe();
  }, []);

  const signInWithPin = async (pin) => {
    const { error } = await supabaseClient.auth.signInWithPassword({
      email: FAMILY_EMAIL, password: pin,
    });
    return { error };
  };

  const signInWithMagicLink = async (email) => {
    const { error } = await supabaseClient.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + window.location.pathname },
    });
    return { error };
  };

  const signOut = async () => {
    await supabaseClient.auth.signOut();
    setUser(null);
  };

  return { user, loading, showLogin, setShowLogin, signInWithPin, signInWithMagicLink, signOut };
}

// ============================================================================
// PROFILES HOOK (Supabase-backed)
// ============================================================================
const profileStorageKeys = (profileId) => ({
  COLLECTION: `packripper:p:${profileId}:collection`,
  RIP_LOG: `packripper:p:${profileId}:log`,
  STATS: `packripper:p:${profileId}:stats`,
});

function useProfiles(user) {
  const [profiles, setProfiles] = useState([]);
  const [loading, setLoading] = useState(false);
  const [activeProfileId, setActiveProfileIdRaw] = useState(null);

  useEffect(() => {
    if (!user) { setProfiles([]); setActiveProfileIdRaw(null); return; }
    loadProfiles();
  }, [user?.id]);

  const loadProfiles = async () => {
    setLoading(true);
    try {
      const { data, error } = await supabaseClient
        .from('profiles').select('*').eq('user_id', user.id).order('sort_order');
      if (error) throw error;

      let list = data;
      if (data.length === 0) list = await seedProfiles();

      list.forEach(p => {
        const k = profileStorageKeys(p.id);
        saveStored(k.COLLECTION, p.collection || []);
        saveStored(k.RIP_LOG, p.rip_log || []);
        saveStored(k.STATS, p.stats || { packsOpened: 0, totalSpent: 0, totalValue: 0 });
      });

      setProfiles(list);
      const lastId = localStorage.getItem('packripper:activeProfileId');
      const match = list.find(p => p.id === lastId);
      setActiveProfileIdRaw(match ? match.id : list[0]?.id);
    } catch (err) {
      console.error('Profile load failed, using localStorage fallback', err);
    } finally {
      setLoading(false);
    }
  };

  const seedProfiles = async () => {
    const isFamily = user.email === FAMILY_EMAIL;
    const templates = isFamily
      ? [{ name: 'Ollie', color: '#3d7dca', sort_order: 0 },
         { name: 'Sky', color: '#ff69b4', sort_order: 1 },
         { name: 'Dadai', color: '#ff9800', sort_order: 2 }]
      : [{ name: 'My Collection', color: '#3d7dca', sort_order: 0 }];

    const rows = templates.map(t => {
      const row = { user_id: user.id, ...t };
      if (isFamily) {
        const old = storageKeys(t.name);
        const c = loadStored(old.COLLECTION, []);
        const r = loadStored(old.RIP_LOG, []);
        const s = loadStored(old.STATS, { packsOpened: 0, totalSpent: 0, totalValue: 0 });
        if (c.length > 0) row.collection = c;
        if (r.length > 0) row.rip_log = r;
        if (s.packsOpened > 0) row.stats = s;
      }
      return row;
    });

    const { data, error } = await supabaseClient.from('profiles').insert(rows).select();
    if (error) { console.error('Seed failed', error); return []; }
    return data;
  };

  const setActiveProfile = (id) => {
    setActiveProfileIdRaw(id);
    localStorage.setItem('packripper:activeProfileId', id);
  };

  const syncProfile = async (id, updates) => {
    setProfiles(prev => prev.map(p => p.id === id ? { ...p, ...updates } : p));
    supabaseClient.from('profiles').update(updates).eq('id', id)
      .then(({ error }) => { if (error) console.warn('Sync error:', error); });
  };

  const addProfile = async (name, color) => {
    if (!user) return { error: 'Not signed in' };
    color = color || ['#3d7dca','#ff69b4','#ff9800','#4dad5b','#ab47bc','#ef5350'][profiles.length % 6];
    const ord = profiles.length > 0 ? Math.max(...profiles.map(p => p.sort_order)) + 1 : 0;
    const { data, error } = await supabaseClient
      .from('profiles').insert({ user_id: user.id, name, color, sort_order: ord }).select().single();
    if (error) return { error };
    setProfiles(prev => [...prev, data]);
    return { data };
  };

  return { profiles, loading, activeProfileId, setActiveProfile, syncProfile, addProfile };
}

// ============================================================================
// PACK COMPOSITION LOGIC
// ============================================================================
const RARITY_WEIGHTS = {
  'Rare': 55,
  'Rare Holo': 20,
  'Rare Holo V': 8,
  'Rare Holo VMAX': 3,
  'Rare Holo VSTAR': 3,
  'Rare Ultra': 4,
  'Rare Secret': 2,
  'Rare Rainbow': 2,
  'Rare Shiny': 1.5,
  'Rare Shiny GX': 1,
  'Amazing Rare': 0.5,
  'Double Rare': 6,
  'Illustration Rare': 2,
  'Special Illustration Rare': 1.5,
  'Hyper Rare': 1,
};

const HIGH_VALUE_RARITIES = new Set([
  'Rare Holo', 'Rare Holo V', 'Rare Holo VMAX', 'Rare Holo VSTAR',
  'Rare Ultra', 'Rare Secret', 'Rare Rainbow', 'Rare Shiny',
  'Rare Shiny GX', 'Amazing Rare', 'Rare Holo EX', 'Rare Holo GX',
  'Rare Holo LV.X', 'Rare Prime', 'Rare ACE', 'Rare BREAK',
  'Rare Prism Star', 'LEGEND', 'Radiant Rare', 'Trainer Gallery Rare Holo',
  'Double Rare', 'Ultra Rare', 'Illustration Rare', 'Special Illustration Rare',
  'Hyper Rare', 'Shiny Rare', 'Shiny Ultra Rare',
]);

const isHighValue = (rarity) => {
  if (!rarity) return false;
  return HIGH_VALUE_RARITIES.has(rarity) || rarity.includes('Holo') ||
         rarity.includes('Ultra') || rarity.includes('Secret') ||
         rarity.includes('Rainbow') || rarity.includes('Shiny') ||
         rarity.includes('Illustration') || rarity.includes('Hyper');
};

const getCardMarketPrice = (card) => {
  if (!card?.tcgplayer?.prices) return 0;
  const prices = card.tcgplayer.prices;
  const sources = ['holofoil', 'reverseHolofoil', 'normal', 'unlimited', '1stEdition'];
  for (const source of sources) {
    if (prices[source]?.market) return prices[source].market;
    if (prices[source]?.mid) return prices[source].mid;
  }
  return 0;
};

const weightedRandom = (weights) => {
  const total = Object.values(weights).reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (const [key, weight] of Object.entries(weights)) {
    r -= weight;
    if (r <= 0) return key;
  }
  return Object.keys(weights)[0];
};

const SET_THEMES = {
  'sv1': { bg: '#c1272d', accent: '#fbb040', pattern: 'stripes' },
  'sv2': { bg: '#662d91', accent: '#ff6bb5', pattern: 'stripes' },
  'sv3': { bg: '#00a99d', accent: '#fff200', pattern: 'rays' },
  'sv4': { bg: '#004e7c', accent: '#00c0f0', pattern: 'rays' },
  'sv5': { bg: '#8b4513', accent: '#ffd700', pattern: 'geometric' },
  'sv6': { bg: '#1a1a4e', accent: '#ff00ff', pattern: 'rays' },
  'sv7': { bg: '#2e7d32', accent: '#c6ff00', pattern: 'organic' },
  'sv8': { bg: '#4a148c', accent: '#ffeb3b', pattern: 'rays' },
  'swsh7': { bg: '#1a237e', accent: '#00bcd4', pattern: 'rays' },
  'swsh9': { bg: '#b71c1c', accent: '#ff9800', pattern: 'stripes' },
  'swsh12pt5': { bg: '#4a148c', accent: '#ffd700', pattern: 'rays' },
  'swsh11': { bg: '#263238', accent: '#f44336', pattern: 'stripes' },
  'base1': { bg: '#d32f2f', accent: '#fbc02d', pattern: 'classic' },
  'base2': { bg: '#f57c00', accent: '#ffc107', pattern: 'classic' },
  'base3': { bg: '#7b1fa2', accent: '#ffd54f', pattern: 'classic' },
};

const getSetTheme = (setId) => {
  if (SET_THEMES[setId]) return SET_THEMES[setId];
  let hash = 0;
  for (let i = 0; i < setId.length; i++) {
    hash = setId.charCodeAt(i) + ((hash << 5) - hash);
  }
  const hue = Math.abs(hash) % 360;
  const accentHue = (hue + 180) % 360;
  const patterns = ['stripes', 'rays', 'geometric', 'organic'];
  const pattern = patterns[Math.abs(hash) % patterns.length];
  return {
    bg: `hsl(${hue}, 65%, 35%)`,
    accent: `hsl(${accentHue}, 85%, 60%)`,
    pattern,
  };
};

// localStorage-backed state (works offline, persists across sessions, no artifact sandbox)
const storageKeys = (profile) => ({
  COLLECTION: `packripper:${profile}:collection`,
  RIP_LOG: `packripper:${profile}:log`,
  STATS: `packripper:${profile}:stats`,
});

const loadStored = (key, fallback) => {
  try {
    const val = localStorage.getItem(key);
    return val ? JSON.parse(val) : fallback;
  } catch (e) { return fallback; }
};

const saveStored = (key, value) => {
  try { localStorage.setItem(key, JSON.stringify(value)); }
  catch (e) { console.warn('localStorage write failed', e); }
};

// Migrate legacy flat keys → Dadai namespace (one-time)
(() => {
  const old = localStorage.getItem('packripper:collection');
  if (old && !localStorage.getItem('packripper:Dadai:collection')) {
    ['collection', 'log', 'stats'].forEach(k => {
      const v = localStorage.getItem(`packripper:${k}`);
      if (v) localStorage.setItem(`packripper:Dadai:${k}`, v);
    });
  }
  // Remove old keys after migration
  if (old && localStorage.getItem('packripper:Dadai:collection')) {
    ['collection', 'log', 'stats'].forEach(k => localStorage.removeItem(`packripper:${k}`));
  }
})();


const PACK_COST = 4.49;
const API_BASE = 'https://api.pokemontcg.io/v2';

// ============================================================================
// MAIN APP
// ============================================================================
function PokemonPackRipper({ user, signOut, showLogin, setShowLogin, profiles, activeProfileId, setActiveProfileFn, syncProfile, addProfile, profilesLoading }) {
  const activeProfile = useMemo(() => {
    if (!user || !profiles || !activeProfileId) return null;
    return profiles.find(p => p.id === activeProfileId) || null;
  }, [user, profiles, activeProfileId]);

  const STORAGE_KEYS = useMemo(() => {
    if (!activeProfileId) return null;
    return profileStorageKeys(activeProfileId);
  }, [activeProfileId]);

  const [view, setView] = useState('shelf');
  const [sets, setSets] = useState([]);
  const [loadingSets, setLoadingSets] = useState(true);
  const [apiError, setApiError] = useState(null);
  const [selectedSet, setSelectedSet] = useState(null);
  const [heroCards, setHeroCards] = useState({});
  const [pulledCards, setPulledCards] = useState([]);
  const [revealIndex, setRevealIndex] = useState(0);
  const [collection, setCollection] = useState([]);
  const [ripLog, setRipLog] = useState([]);
  const [addedPackIndices, setAddedPackIndices] = useState(new Set());
  const [stats, setStats] = useState({ packsOpened: 0, totalSpent: 0, totalValue: 0 });
  const [ripStage, setRipStage] = useState(0);
  const [cardCache, setCardCache] = useState({});
  const [loadingPack, setLoadingPack] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [filterSeries, setFilterSeries] = useState('all');

  // Load data when active profile changes
  useEffect(() => {
    if (!user || !activeProfile) {
      if (!user) { setCollection([]); setRipLog([]); setStats({ packsOpened: 0, totalSpent: 0, totalValue: 0 }); }
      return;
    }
    setCollection(activeProfile.collection || []);
    setRipLog(activeProfile.rip_log || []);
    setStats(activeProfile.stats || { packsOpened: 0, totalSpent: 0, totalValue: 0 });
  }, [activeProfileId, user?.id]);

  const switchProfile = (id) => {
    setActiveProfileFn(id);
    setView('shelf');
  };

  useEffect(() => {
    fetch(`${API_BASE}/sets?orderBy=-releaseDate&pageSize=250`)
      .then(r => {
        if (!r.ok) throw new Error(`API returned ${r.status}`);
        return r.json();
      })
      .then(data => {
        setSets(data.data || []);
        setLoadingSets(false);
      })
      .catch(e => {
        console.error('Sets fetch failed', e);
        setApiError(e.message);
        setLoadingSets(false);
      });
  }, []);

  const persistCollection = (newCollection) => {
    setCollection(newCollection);
    if (user && STORAGE_KEYS) {
      saveStored(STORAGE_KEYS.COLLECTION, newCollection);
      syncProfile(activeProfileId, { collection: newCollection });
    }
  };
  const persistLog = (newLog) => {
    setRipLog(newLog);
    if (user && STORAGE_KEYS) {
      saveStored(STORAGE_KEYS.RIP_LOG, newLog);
      syncProfile(activeProfileId, { rip_log: newLog });
    }
  };
  const persistStats = (newStats) => {
    setStats(newStats);
    if (user && STORAGE_KEYS) {
      saveStored(STORAGE_KEYS.STATS, newStats);
      syncProfile(activeProfileId, { stats: newStats });
    }
  };

  const fetchSetCards = async (setId) => {
    if (cardCache[setId]) return cardCache[setId];
    const allCards = [];
    let page = 1;
    while (page <= 3) {
      const res = await fetch(`${API_BASE}/cards?q=set.id:${setId}&pageSize=250&page=${page}`);
      if (!res.ok) throw new Error(`API error ${res.status}`);
      const data = await res.json();
      if (!data.data || data.data.length === 0) break;
      allCards.push(...data.data);
      if (data.data.length < 250) break;
      page++;
    }
    const byRarity = {};
    allCards.forEach(card => {
      const r = card.rarity || 'Common';
      if (!byRarity[r]) byRarity[r] = [];
      byRarity[r].push(card);
    });
    const cache = { all: allCards, byRarity };
    setCardCache(prev => ({ ...prev, [setId]: cache }));
    return cache;
  };

  const fetchHeroCard = useCallback(async (set) => {
    if (heroCards[set.id]) return;
    try {
      const preferredRarities = ['Rare Secret', 'Rare Rainbow', 'Special Illustration Rare',
        'Hyper Rare', 'Rare Holo VMAX', 'Rare Holo VSTAR', 'Illustration Rare',
        'Rare Ultra', 'Rare Holo V', 'Rare Holo'];
      for (const rarity of preferredRarities) {
        const res = await fetch(
          `${API_BASE}/cards?q=set.id:${set.id} rarity:"${rarity}"&pageSize=5&orderBy=-nationalPokedexNumbers`
        );
        if (!res.ok) continue;
        const data = await res.json();
        if (data.data?.length > 0) {
          const hero = data.data[Math.floor(Math.random() * Math.min(3, data.data.length))];
          setHeroCards(prev => ({ ...prev, [set.id]: hero.images?.large || hero.images?.small }));
          return;
        }
      }
      const res = await fetch(`${API_BASE}/cards?q=set.id:${set.id}&pageSize=1`);
      if (res.ok) {
        const data = await res.json();
        if (data.data?.[0]) {
          setHeroCards(prev => ({ ...prev, [set.id]: data.data[0].images?.large || data.data[0].images?.small }));
        }
      }
    } catch (e) { /* silent fail */ }
  }, [heroCards]);

  const openPack = async (set) => {
    setLoadingPack(true);
    setRipStage(0);
    setAddedPackIndices(new Set());
    setView('ripping');
    try {
      const { byRarity } = await fetchSetCards(set.id);
      const pack = generatePack(byRarity);
      setPulledCards(pack);
      setLoadingPack(false);
      setTimeout(() => setRipStage(1), 300);
      setTimeout(() => setRipStage(2), 1200);
      setTimeout(() => {
        setRipStage(3);
        setRevealIndex(0);
        setView('reveal');
        const packValue = pack.reduce((sum, c) => sum + getCardMarketPrice(c), 0);
        persistStats({
          packsOpened: stats.packsOpened + 1,
          totalSpent: stats.totalSpent + PACK_COST,
          totalValue: stats.totalValue + packValue,
        });
        const logEntry = {
          id: Date.now(),
          setName: set.name,
          setId: set.id,
          setImage: set.images?.logo,
          cards: pack.map(c => ({
            id: c.id, name: c.name, rarity: c.rarity,
            image: c.images?.small, price: getCardMarketPrice(c)
          })),
          value: packValue,
          timestamp: new Date().toISOString(),
        };
        persistLog([logEntry, ...ripLog].slice(0, 100));
        const hitIndices = new Set();
        const collectionCards = [];
        pack.forEach((c, idx) => {
          if (isHighValue(c.rarity)) {
            hitIndices.add(idx);
            collectionCards.push({
              id: c.id + '-' + Date.now() + Math.random(),
              cardId: c.id,
              name: c.name,
              rarity: c.rarity,
              image: c.images?.large || c.images?.small,
              smallImage: c.images?.small,
              price: getCardMarketPrice(c),
              setName: set.name,
              setId: set.id,
              pulledAt: new Date().toISOString(),
              types: c.types,
              hp: c.hp,
              number: c.number,
            });
          }
        });
        if (collectionCards.length > 0) {
          persistCollection([...collectionCards, ...collection]);
        }
        setAddedPackIndices(hitIndices);
      }, 2200);
    } catch (e) {
      console.error('Pack open failed', e);
      setLoadingPack(false);
      setView('shelf');
      alert('Failed to open pack. The API may be down — try again or pick a different set.');
    }
  };

  const generatePack = (byRarity) => {
    const pack = [];
    const pickFrom = (rarity, count) => {
      const pool = byRarity[rarity];
      if (!pool || pool.length === 0) return [];
      const picks = [];
      for (let i = 0; i < count; i++) {
        picks.push(pool[Math.floor(Math.random() * pool.length)]);
      }
      return picks;
    };
    pack.push(...pickFrom('Common', 4));
    pack.push(...pickFrom('Uncommon', 3));
    const reverseCandidates = [...(byRarity['Common'] || []), ...(byRarity['Uncommon'] || [])];
    if (reverseCandidates.length > 0) {
      const rh = { ...reverseCandidates[Math.floor(Math.random() * reverseCandidates.length)] };
      rh._reverseHolo = true;
      pack.push(rh);
    }
    pack.push(...pickFrom('Common', 1));
    const weights = {};
    Object.keys(RARITY_WEIGHTS).forEach(r => {
      if (byRarity[r]?.length > 0) weights[r] = RARITY_WEIGHTS[r];
    });
    Object.keys(byRarity).forEach(r => {
      if (!weights[r] && r !== 'Common' && r !== 'Uncommon' && byRarity[r].length > 0) {
        weights[r] = isHighValue(r) ? 2 : 5;
      }
    });
    let hitRarity = weightedRandom(weights);
    if (!byRarity[hitRarity] || byRarity[hitRarity].length === 0) {
      hitRarity = Object.keys(byRarity).find(r => r.includes('Rare')) || 'Common';
    }
    if (byRarity[hitRarity]?.length > 0) {
      pack.push(byRarity[hitRarity][Math.floor(Math.random() * byRarity[hitRarity].length)]);
    } else {
      const anyCard = Object.values(byRarity).flat()[0];
      if (anyCard) pack.push(anyCard);
    }
    return pack.filter(Boolean);
  };

  const revealNext = () => {
    if (revealIndex < pulledCards.length - 1) setRevealIndex(revealIndex + 1);
    else setView('summary');
  };

  const addCardToCollection = (index) => {
    if (addedPackIndices.has(index)) return;
    const c = pulledCards[index];
    if (!c || !selectedSet) return;
    const collectionCard = {
      id: c.id + '-' + Date.now() + Math.random(),
      cardId: c.id,
      name: c.name,
      rarity: c.rarity,
      image: c.images?.large || c.images?.small,
      smallImage: c.images?.small,
      price: getCardMarketPrice(c),
      setName: selectedSet.name,
      setId: selectedSet.id,
      pulledAt: new Date().toISOString(),
      types: c.types,
      hp: c.hp,
      number: c.number,
    };
    persistCollection([collectionCard, ...collection]);
    const next = new Set(addedPackIndices);
    next.add(index);
    setAddedPackIndices(next);
  };

  const confirmBuy = (set) => {
    setSelectedSet(set);
    fetchHeroCard(set);
    setView('confirm');
  };

  const removeFromCollection = (id) => {
    persistCollection(collection.filter(c => c.id !== id));
  };

  const clearAllData = () => {
    if (!confirm('Clear entire collection, log, and stats?')) return;
    persistCollection([]);
    persistLog([]);
    persistStats({ packsOpened: 0, totalSpent: 0, totalValue: 0 });
  };

  const allSeries = useMemo(() => [...new Set(sets.map(s => s.series))], [sets]);
  const filteredSets = sets.filter(s => {
    const matchesSearch = s.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                         s.series.toLowerCase().includes(searchQuery.toLowerCase());
    const matchesSeries = filterSeries === 'all' || s.series === filterSeries;
    return matchesSearch && matchesSeries;
  });

  const pnl = stats.totalValue - stats.totalSpent;

  return (
    <div className="ripper-root">
      <Styles />
      <header className="ripper-header">
        <div className="logo-mark" onClick={() => setView('shelf')}>
          <span className="logo-bolt">⚡</span>
          <h1>PACK RIPPER</h1>
        </div>
        <nav className="ripper-nav">
          <button className={view === 'shelf' ? 'nav-btn active' : 'nav-btn'} onClick={() => setView('shelf')}>SHOP</button>
          <button className={view === 'collection' ? 'nav-btn active' : 'nav-btn'} onClick={() => setView('collection')}>
            COLLECTION <span className="count-badge">{collection.length}</span>
          </button>
          <button className={view === 'log' ? 'nav-btn active' : 'nav-btn'} onClick={() => setView('log')}>LOG</button>
        </nav>
        <div className="stats-bar">
          <div className="stat-chip"><span className="stat-label">PACKS</span><span className="stat-val">{stats.packsOpened}</span></div>
          <div className="stat-chip"><span className="stat-label">SPENT</span><span className="stat-val">${stats.totalSpent.toFixed(2)}</span></div>
          <div className={`stat-chip pnl ${pnl >= 0 ? 'up' : 'down'}`}>
            <span className="stat-label">P&L</span>
            <span className="stat-val">{pnl >= 0 ? '+' : ''}${pnl.toFixed(0)}</span>
          </div>
          {user ? (
            <button className="auth-btn" onClick={signOut}>SIGN OUT</button>
          ) : (
            <button className="auth-btn sign-in" onClick={() => setShowLogin(true)}>SIGN IN</button>
          )}
        </div>
      </header>

      {user && (
        <div className="profile-switcher">
          {profilesLoading ? (
            <span className="profile-loading">Loading profiles...</span>
          ) : (
            <>
              {profiles.map(p => (
                <button
                  key={p.id}
                  className={`profile-chip ${activeProfileId === p.id ? 'active' : ''}`}
                  style={{
                    '--chip-color': p.color,
                    background: activeProfileId === p.id ? p.color : 'transparent',
                    borderColor: p.color,
                    color: activeProfileId === p.id ? '#0a0e1a' : p.color,
                  }}
                  onClick={() => switchProfile(p.id)}
                >
                  {p.name}
                </button>
              ))}
              <button className="profile-chip add-profile-btn" onClick={() => {
                const name = prompt('Profile name:');
                if (name?.trim()) addProfile(name.trim());
              }}>+</button>
            </>
          )}
        </div>
      )}
      {!user && (
        <div className="profile-switcher">
          <span className="guest-label">GUEST MODE — data won't save</span>
        </div>
      )}

      <main className="ripper-main">
        {apiError && (
          <div className="api-error">
            <strong>API unreachable:</strong> {apiError}.
            The Pokémon TCG API may be rate-limiting or down. Try refreshing in a moment.
          </div>
        )}

        {view === 'shelf' && (
          <PackShelf
            sets={filteredSets}
            loading={loadingSets}
            onSelect={confirmBuy}
            searchQuery={searchQuery}
            setSearchQuery={setSearchQuery}
            filterSeries={filterSeries}
            setFilterSeries={setFilterSeries}
            allSeries={allSeries}
            heroCards={heroCards}
            fetchHeroCard={fetchHeroCard}
          />
        )}
        {view === 'confirm' && selectedSet && (
          <BuyConfirmation
            set={selectedSet}
            heroImage={heroCards[selectedSet.id]}
            onConfirm={() => openPack(selectedSet)}
            onCancel={() => setView('shelf')}
          />
        )}
        {view === 'ripping' && (
          <RipAnimation
            set={selectedSet}
            stage={ripStage}
            loading={loadingPack}
            heroImage={heroCards[selectedSet?.id]}
          />
        )}
        {view === 'reveal' && pulledCards.length > 0 && (
          <CardReveal cards={pulledCards} revealIndex={revealIndex} onNext={revealNext} onAddToCollection={addCardToCollection} addedIndices={addedPackIndices} />
        )}
        {view === 'summary' && (
          <PackSummary
            cards={pulledCards}
            set={selectedSet}
            onRipAgain={() => openPack(selectedSet)}
            onBackToShelf={() => setView('shelf')}
            onViewCollection={() => setView('collection')}
            isGuest={!user}
            onSignIn={() => setShowLogin(true)}
          />
        )}
        {view === 'collection' && (
          <Collection cards={collection} onRemove={removeFromCollection} onClear={clearAllData} isGuest={!user} onSignIn={() => setShowLogin(true)} />
        )}
        {view === 'log' && <RipLog log={ripLog} isGuest={!user} onSignIn={() => setShowLogin(true)} />}
      </main>
    </div>
  );
}

    <div className="pack-shelf">
      <div className="shelf-hero">

function PackThumb({ set, onSelect, heroImage, fetchHero }) {
  const theme = useMemo(() => getSetTheme(set.id), [set.id]);
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    if (!ref.current) return;
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        setVisible(true);
        fetchHero(set);
        observer.disconnect();
      }
    }, { rootMargin: '100px' });
    observer.observe(ref.current);
    return () => observer.disconnect();
  }, [set.id]);

  return (
    <button ref={ref} className="pack-thumb" onClick={() => onSelect(set)} aria-label={`Buy ${set.name} booster pack`}>
      <PackArt set={set} theme={theme} heroImage={visible ? heroImage : null} />
      <div className="pack-thumb-info">
        <div className="pack-thumb-name">{set.name}</div>
        <div className="pack-thumb-meta">
          <span>{set.total} cards</span>
          <span className="pack-thumb-price">${PACK_COST}</span>
        </div>
      </div>
    </button>
  );
}

function CardReveal({ cards, revealIndex, onNext, onAddToCollection, addedIndices }) {
  const card = cards[revealIndex];
  if (!card) return null;
  const isLast = revealIndex === cards.length - 1;
  const isHit = isHighValue(card.rarity);
  const isAdded = addedIndices && addedIndices.has(revealIndex);
  const price = getCardMarketPrice(card);
  return (
    <div className="reveal-stage">
      <div className="reveal-progress">
        <div className="progress-label">
          CARD {revealIndex + 1} / {cards.length}
          {isLast && <span className="hit-slot-label"> • HIT SLOT</span>}
        </div>
        <div className="progress-bar">
          <div className="progress-fill" style={{ width: `${((revealIndex + 1) / cards.length) * 100}%` }} />
        </div>
        <div className="card-dots">
          {cards.map((c, i) => (
            <div key={i} className={`dot-pip ${i === revealIndex ? 'active' : ''} ${i < revealIndex ? 'revealed' : ''} ${isHighValue(c.rarity) && i <= revealIndex ? 'hit' : ''}`} />
          ))}
        </div>
      </div>
      <div key={revealIndex} className={`reveal-card-wrapper ${isHit ? 'is-hit' : ''}`} onClick={onNext}>
        {isHit && <div className="hit-burst" />}
        {isHit && <div className="hit-stars">✦✦✦</div>}
        <CardDisplay card={card} large interactive />
        <div className="reveal-card-info">
          <div className="reveal-card-name">{card.name}</div>
          <div className="reveal-card-meta">
            <span className={`rarity-tag rarity-${getRarityTier(card.rarity)}`}>
              {card.rarity || 'Common'}{card._reverseHolo && ' (Reverse Holo)'}
            </span>
            {price > 0 && <span className="card-price">${price.toFixed(2)}</span>}
          </div>
        </div>
      </div>
      <div className="reveal-actions">
        {isAdded ? (
          <button className="reveal-add-btn is-added" disabled>✓ IN COLLECTION</button>
        ) : (
          <button className="reveal-add-btn" onClick={() => onAddToCollection(revealIndex)}>+ COLLECTION</button>
        )}
        <button className="reveal-next-btn" onClick={onNext}>{isLast ? 'SEE RESULTS →' : 'NEXT CARD →'}</button>
      </div>
      <div className="tap-hint">or tap the card to advance</div>
    </div>
  );
}

function CardDisplay({ card, large, interactive, small }) {
  const ref = useRef(null);
  const [transform, setTransform] = useState('');
  const [shineStyle, setShineStyle] = useState({});
  const isHolo = card.rarity && (card.rarity.includes('Holo') || card.rarity.includes('Ultra')
    || card.rarity.includes('Secret') || card.rarity.includes('Rainbow')
    || card.rarity.includes('Shiny') || card.rarity.includes('Rare') || card._reverseHolo
    || card.rarity.includes('Illustration') || card.rarity.includes('Hyper'));
  const handleMouseMove = useCallback((e) => {
    if (!interactive || !ref.current) return;
    const rect = ref.current.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 100;
    const y = ((e.clientY - rect.top) / rect.height) * 100;
    const tiltX = (y - 50) / 5;
    const tiltY = (50 - x) / 5;
    setTransform(`perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(1.02)`);
    setShineStyle({
      background: `radial-gradient(circle at ${x}% ${y}%, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 50%)`,
      opacity: 1,
    });
  }, [interactive]);
  const handleMouseLeave = useCallback(() => { setTransform(''); setShineStyle({ opacity: 0 }); }, []);
  const imageUrl = card.images?.large || card.images?.small || card.image || card.smallImage;
  const rarityClass = isHolo ? `holo-${getRarityTier(card.rarity)}` : '';
  return (
    <div ref={ref}
      className={`card-display ${large ? 'large' : ''} ${small ? 'small' : ''} ${rarityClass}`}
      style={{ transform, transition: interactive && !transform ? 'transform 0.4s ease' : 'transform 0.1s ease' }}
      onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave}>
      {imageUrl ? <img src={imageUrl} alt={card.name} loading="lazy" /> : <div className="card-placeholder">{card.name}</div>}
      {isHolo && <div className="holo-effect" />}
      {isHolo && <div className="holo-shine" style={shineStyle} />}
    </div>
  );
}

  const hits = cards.filter(c => isHighValue(c.rarity));
  return (
    <div className="summary-stage">
      <div className="summary-header">
        <h2 className="summary-title">PACK CRACKED</h2>
        <div className="summary-set">{set?.name}</div>
      </div>
      <div className="summary-stats">
        <div className={`summary-stat-card ${profit >= 0 ? 'profit' : 'loss'}`}>
          <div className="stat-card-label">PACK VALUE</div>
          <div className="stat-card-value">${totalValue.toFixed(2)}</div>
          <div className="stat-card-sub">vs ${PACK_COST} cost = {profit >= 0 ? '+' : ''}${profit.toFixed(2)}</div>
        </div>
        <div className="summary-stat-card">
          <div className="stat-card-label">HIT CARDS</div>
          <div className="stat-card-value">{hits.length}</div>
          <div className="stat-card-sub">{hits.length > 0 ? 'Added to collection' : 'No hits this pack'}</div>
        </div>
      </div>
      <div className="summary-cards-grid">
        {cards.map((card, i) => (
          <div key={i} className={`summary-card ${isHighValue(card.rarity) ? 'is-hit' : ''}`}>
            <CardDisplay card={card} />
            <div className="summary-card-label">
              <div className="summary-card-name">{card.name}</div>
              <div className="summary-card-rarity">{card.rarity || 'Common'}{card._reverseHolo && ' ↻'}</div>
              {getCardMarketPrice(card) > 0 && <div className="summary-card-price">${getCardMarketPrice(card).toFixed(2)}</div>}
            </div>
          </div>
        ))}
      </div>
      {isGuest && (
        <div className="guest-nudge" onClick={onSignIn}>
          ✦ Sign in to keep your collection ✦
        </div>
      )}
      <div className="summary-actions">
        <button className="action-btn primary" onClick={onRipAgain}>BUY ANOTHER →</button>
        <button className="action-btn" onClick={onViewCollection}>VIEW COLLECTION</button>
        <button className="action-btn secondary" onClick={onBackToShelf}>BACK TO SHOP</button>
      </div>
    </div>
  );
}

function Collection({ cards, onRemove, onClear, isGuest, onSignIn }) {
  const [sortBy, setSortBy] = useState('recent');
  const [filterSet, setFilterSet] = useState('all');
  const sets = [...new Set(cards.map(c => c.setName))];
  let displayed = filterSet === 'all' ? cards : cards.filter(c => c.setName === filterSet);
  displayed = [...displayed].sort((a, b) => {
    if (sortBy === 'value') return (b.price || 0) - (a.price || 0);
    if (sortBy === 'name') return a.name.localeCompare(b.name);
    if (sortBy === 'rarity') return (b.rarity || '').localeCompare(a.rarity || '');
    return new Date(b.pulledAt) - new Date(a.pulledAt);
  });
  const totalValue = cards.reduce((sum, c) => sum + (c.price || 0), 0);
  if (cards.length === 0) {
    return (
      <div className="empty-state">
        <div className="empty-icon">◈</div>
        <h3>NO HITS YET</h3>
        <p>Rip some packs. Holo rares and above will auto-add to your collection.</p>
        {isGuest && <SignInPrompt onSignIn={onSignIn} message="Sign in to save your collection across devices" />}
      </div>
    );
  }
  return (
    <div className="collection-view">
      <div className="collection-header">
        <div>
          <h2 className="section-title">COLLECTION</h2>
          <div className="collection-meta">{cards.length} cards • ${totalValue.toFixed(2)} total value</div>
        </div>
        <div className="collection-controls">
          <select value={filterSet} onChange={e => setFilterSet(e.target.value)} className="control-select">
            <option value="all">All sets</option>
            {sets.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="control-select">
            <option value="recent">Most recent</option>
            <option value="value">Highest value</option>
            <option value="rarity">Rarity</option>
            <option value="name">Name</option>
          </select>
          <button className="control-btn danger" onClick={onClear}>CLEAR ALL</button>
        </div>
      </div>
      <div className="collection-grid">
        {displayed.map(card => (
          <div key={card.id} className="collection-card">
            <CardDisplay card={card} />
            <div className="collection-card-info">
              <div className="collection-card-name">{card.name}</div>
              <div className="collection-card-set">{card.setName}</div>
              <div className="collection-card-bottom">
                <span className={`rarity-tag rarity-${getRarityTier(card.rarity)}`}>{card.rarity}</span>
                {card.price > 0 && <span className="collection-card-price">${card.price.toFixed(2)}</span>}
              </div>
              <button className="remove-btn" onClick={() => onRemove(card.id)}>Remove</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

  if (log.length === 0) {
    return (
      <div className="empty-state">
        <div className="empty-icon">⟲</div>
        <h3>NO RIPS LOGGED</h3>

        {isGuest && <SignInPrompt onSignIn={onSignIn} message="Sign in to save your rip history" />}
      </div>

  }
  return (
    <div className="log-view">
      <h2 className="section-title">RIP HISTORY</h2>
      <div className="log-list">
        {log.map(entry => {
          const profit = entry.value - PACK_COST;
          const hits = entry.cards.filter(c => isHighValue(c.rarity));
          return (
            <div key={entry.id} className="log-entry">
              <div className="log-entry-header">
                {entry.setImage && <img src={entry.setImage} alt="" className="log-set-img" />}
                <div className="log-entry-info">
                  <div className="log-set-name">{entry.setName}</div>
                  <div className="log-time">{new Date(entry.timestamp).toLocaleString()}</div>
                </div>
                <div className={`log-entry-value ${profit >= 0 ? 'profit' : 'loss'}`}>
                  ${entry.value.toFixed(2)}
                  <span className="log-profit">({profit >= 0 ? '+' : ''}${profit.toFixed(2)})</span>
                </div>
              </div>
              <div className="log-cards-strip">
                {entry.cards.map((c, i) => (
                  <div key={i} className={`log-card-mini ${isHighValue(c.rarity) ? 'hit' : ''}`}>
                    {c.image && <img src={c.image} alt={c.name} loading="lazy" />}
                  </div>
                ))}
              </div>
              {hits.length > 0 && <div className="log-hits">HITS: {hits.map(h => h.name).join(' • ')}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function getRarityTier(rarity) {
  if (!rarity) return 'common';
  const r = rarity.toLowerCase();
  if (r.includes('secret') || r.includes('rainbow') || r.includes('hyper')) return 'secret';
  if (r.includes('vmax') || r.includes('vstar')) return 'vmax';
  if (r.includes('shiny') || r.includes('amazing') || r.includes('illustration')) return 'shiny';
  if (r.includes('ultra') || r.includes('v') || r.includes('ex') || r.includes('gx')) return 'ultra';
  if (r.includes('holo')) return 'holo';
  if (r.includes('rare')) return 'rare';
  if (r.includes('uncommon')) return 'uncommon';
  return 'common';
}

function LoginModal({ onClose, signInWithPin, signInWithMagicLink }) {
  const [mode, setMode] = useState('pin');
  const [pin, setPin] = useState('');
  const [email, setEmail] = useState('');
  const [error, setError] = useState('');
  const [sent, setSent] = useState(false);
  const [loading, setLoading] = useState(false);

  const handlePin = async () => {
    if (!pin) return;
    setLoading(true); setError('');
    const { error } = await signInWithPin(pin);
    setLoading(false);
    if (error) setError('Invalid code. Try again.');
  };

  const handleEmail = async () => {
    if (!email) return;
    setLoading(true); setError('');
    const { error } = await signInWithMagicLink(email);
    setLoading(false);
    if (error) setError('Failed to send link. Check your email.');
    else setSent(true);
  };

  return (
    <div className="login-overlay" onClick={onClose}>
      <div className="login-modal" onClick={e => e.stopPropagation()}>
        <button className="login-close" onClick={onClose}>✕</button>
        <h2 className="login-title">SIGN IN</h2>
        <p className="login-subtitle">Save your collection across devices</p>
        <div className="login-tabs">
          <button className={`login-tab ${mode === 'pin' ? 'active' : ''}`} onClick={() => { setMode('pin'); setError(''); }}>FAMILY CODE</button>
          <button className={`login-tab ${mode === 'email' ? 'active' : ''}`} onClick={() => { setMode('email'); setError(''); setSent(false); }}>EMAIL</button>
        </div>
        {mode === 'pin' && (
          <div className="login-form">
            <input type="password" className="login-input" placeholder="Enter family code" value={pin}
              onChange={e => setPin(e.target.value)} onKeyDown={e => e.key === 'Enter' && handlePin()} autoFocus />
            <button className="login-submit" onClick={handlePin} disabled={loading || !pin}>
              {loading ? 'SIGNING IN...' : 'ENTER'}
            </button>
          </div>
        )}
        {mode === 'email' && !sent && (
          <div className="login-form">
            <input type="email" className="login-input" placeholder="your@email.com" value={email}
              onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleEmail()} autoFocus />
            <button className="login-submit" onClick={handleEmail} disabled={loading || !email}>
              {loading ? 'SENDING...' : 'SEND MAGIC LINK'}
            </button>
          </div>
        )}
        {mode === 'email' && sent && (
          <div className="login-sent">
            <div className="sent-icon">✉</div>
            <p>Check your email for a magic link!</p>
            <p className="sent-note">Click the link to sign in. You can close this.</p>
          </div>
        )}
        {error && <div className="login-error">{error}</div>}
      </div>
    </div>
  );
}

function SignInPrompt({ onSignIn, message }) {
  return (
    <div className="sign-in-prompt">
      <p>{message || 'Sign in to save your progress'}</p>
      <button className="action-btn primary" onClick={onSignIn}>SIGN IN</button>
    </div>
  );
}

  const auth = useAuth();
  const profilesHook = useProfiles(auth.user);

  if (auth.loading) {
    return (
      <div className="ripper-root">
        <Styles />
        <div className="loading-screen">
          <div className="poke-loader"><div className="poke-ball-spinner" /><p>Loading...</p></div>
        </div>
      </div>

  }

  return (
    <>
      <PokemonPackRipper
        user={auth.user}
        signOut={auth.signOut}
        showLogin={auth.showLogin}
        setShowLogin={auth.setShowLogin}
        profiles={profilesHook.profiles}
        activeProfileId={profilesHook.activeProfileId}
        setActiveProfileFn={profilesHook.setActiveProfile}
        syncProfile={profilesHook.syncProfile}
        addProfile={profilesHook.addProfile}

      {auth.showLogin && (
        <LoginModal

    </>
  );
}

      @keyframes reveal-in-hit {

      .reveal-card-info { margin-top: 1.5rem; }

      .card-price { font-family: 'Archivo Black', sans-serif; font-size: 1rem; color: var(--accent-green); }

      .summary-stage { padding: 1rem 0 4rem; }

  );
